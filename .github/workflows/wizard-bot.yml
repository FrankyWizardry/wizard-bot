name: Bitcoin Wizard Bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wizard-bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for new wizards (Discord)
        id: run
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_wizards.py

      # X posts independently (own lastXNumber marker). continue-on-error keeps a
      # transient X issue from failing the whole run or blocking the state save;
      # post_x.py already advances its marker only after each successful tweet,
      # so the next run safely retries any that didn't go out.
      - name: Post new wizards to X
        continue-on-error: true
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_x.py

      # Always commit if state.json changed — either bot (Discord or X) may have
      # advanced its own marker, so we can't gate on just the Discord step.
      - name: Save state
        if: always()
        run: |
          git config user.name "wizard-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update wizard state [skip ci]"
          git push || echo "nothing to push"
